<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      position: absolute;
      top: 15px;
      right: 20px;
    }

    .user-info a, .user-info button {
      color: white;
      text-decoration: none;
      margin-right: 10px;
      font-weight: bold;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .user-info a:hover, .user-info button:hover {
      text-decoration: underline;
    }

    .user-name {
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .admin-link {
      background: rgba(255, 255, 255, 0.2);
      padding: 5px 10px;
      border-radius: 4px;
    }

    .admin-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <h1>My Shopping Site</h1>
    <nav>
      <ul class="breadcrumb">
        <li>Home</li>
      </ul>
    </nav>
    <div class="user-info" id="userInfo">
      <!-- User info will be dynamically populated -->
    </div>

    <!-- Shopping Cart Toggle Button (for accessibility, in case JS fails) -->
    <button id="cart-toggle-btn" style="position:fixed;bottom:20px;right:20px;padding:10px 14px;background:#0077cc;color:#fff;border:none;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.2);cursor:pointer;z-index:1200;font-weight:600;display:none;">Toggle Cart</button>
  </header>

  <nav class="category-bar">
    <ul id="category-list">
      <li><a href="index.html">All Products</a></li>
    </ul>
  </nav>

  <main>
    <section class="product-grid" id="product-grid">
      <!-- Products will be loaded here dynamically -->
    </section>
  </main>

  <aside class="shopping-list">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h2 style="margin: 0;">Shopping List</h2>
      <button id="cart-close-btn" style="background:none;border:none;font-size:1.5em;cursor:pointer;line-height:1;">×</button>
    </div>
    <div class="cart-total">Total: $0.00</div>
    <ul>
      <!-- Cart items will be populated by JavaScript -->
    </ul>
    <button class="checkout-btn">Checkout</button>
  </aside>


  <footer>
    
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/index-dynamic.js"></script>
</body>
</html>
