<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - E-Commerce Site</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
    }

    .register-container h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ffffff;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: white;
      color: black;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #dc3545;
      margin-bottom: 20px;
      padding: 12px;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      color: #155724;
      margin-bottom: 20px;
      padding: 12px;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      border-radius: 4px;
      display: none;
    }

    .success-msg.show {
      display: block;
    }

    .register-footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .register-footer a {
      color: blue;
      text-decoration: none;
      font-weight: bold;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .loading {
      display: none;
      text-align: center;
      color: #ffffff;
      margin-top: 10px;
    }

    .password-requirements {
      background: #f0f4ff;
      padding: 10px;
      border-radius: 4px;
      margin-top: 5px;
      font-size: 12px;
      color: #666;
    }

    .requirement {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }

    .requirement::before {
      content: '✓';
      color: #28a745;
      margin-right: 5px;
      display: none;
    }

    .requirement.met::before {
      display: inline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h1>Register</h1>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="off"
        />
        <div class="password-requirements">
          <div class="requirement" id="req-length">
            At least 8 characters
          </div>
          <div class="requirement" id="req-upper">
            At least one uppercase letter
          </div>
          <div class="requirement" id="req-number">
            At least one number
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">Confirm Password</label>
        <input
          type="password"
          id="passwordConfirm"
          name="passwordConfirm"
          placeholder="Confirm your password"
          required
          autocomplete="off"
        />
      </div>

      <button type="submit" class="btn">Register</button>
      <div class="loading" id="loading">Creating account...</div>
    </form>

    <div class="register-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
