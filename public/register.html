<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - E-Commerce Site</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
    }

    .register-container h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #dc3545;
      margin-bottom: 20px;
      padding: 12px;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      color: #155724;
      margin-bottom: 20px;
      padding: 12px;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      border-radius: 4px;
      display: none;
    }

    .success-msg.show {
      display: block;
    }

    .register-footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .register-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      margin-top: 10px;
    }

    .password-requirements {
      background: #f0f4ff;
      padding: 10px;
      border-radius: 4px;
      margin-top: 5px;
      font-size: 12px;
      color: #666;
    }

    .requirement {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }

    .requirement::before {
      content: '✓';
      color: #28a745;
      margin-right: 5px;
      display: none;
    }

    .requirement.met::before {
      display: inline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h1>Register</h1>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="off"
        />
        <div class="password-requirements">
          <div class="requirement" id="req-length">
            At least 8 characters
          </div>
          <div class="requirement" id="req-upper">
            At least one uppercase letter
          </div>
          <div class="requirement" id="req-number">
            At least one number
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">Confirm Password</label>
        <input
          type="password"
          id="passwordConfirm"
          name="passwordConfirm"
          placeholder="Confirm your password"
          required
          autocomplete="off"
        />
      </div>

      <button type="submit" class="btn">Register</button>
      <div class="loading" id="loading">Creating account...</div>
    </form>

    <div class="register-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const passwordConfirmInput = document.getElementById('passwordConfirm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loadingDiv = document.getElementById('loading');

    // Password requirement checkers
    const reqLength = document.getElementById('req-length');
    const reqUpper = document.getElementById('req-upper');
    const reqNumber = document.getElementById('req-number');

    // Client-side input validation
    emailInput.addEventListener('input', function () {
      this.value = this.value.toLowerCase().trim();
    });

    passwordInput.addEventListener('input', function () {
      if (this.value.length > 100) {
        this.value = this.value.substring(0, 100);
      }

      // Check password requirements
      const password = this.value;
      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasNumber = /[0-9]/.test(password);

      reqLength.classList.toggle('met', hasLength);
      reqUpper.classList.toggle('met', hasUpper);
      reqNumber.classList.toggle('met', hasNumber);
    });

    passwordConfirmInput.addEventListener('input', function () {
      if (this.value.length > 100) {
        this.value = this.value.substring(0, 100);
      }
    });

    registerForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      // Clear previous messages
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
      errorMsg.textContent = '';
      successMsg.textContent = '';

      // Client-side validation
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const passwordConfirm = passwordConfirmInput.value;

      if (!email) {
        errorMsg.textContent = 'Please enter your email address.';
        errorMsg.classList.add('show');
        return;
      }

      if (!password) {
        errorMsg.textContent = 'Please enter a password.';
        errorMsg.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        errorMsg.classList.add('show');
        return;
      }

      if (!/[A-Z]/.test(password)) {
        errorMsg.textContent =
          'Password must contain at least one uppercase letter.';
        errorMsg.classList.add('show');
        return;
      }

      if (!/[0-9]/.test(password)) {
        errorMsg.textContent = 'Password must contain at least one number.';
        errorMsg.classList.add('show');
        return;
      }

      if (password !== passwordConfirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.classList.add('show');
        return;
      }

      if (password.length > 100) {
        errorMsg.textContent = 'Password is too long.';
        errorMsg.classList.add('show');
        return;
      }

      loadingDiv.style.display = 'block';

      try {
        // Get CSRF token
        const csrfResponse = await fetch('/api/auth/csrf-token');
        const csrfData = await csrfResponse.json();

        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password, passwordConfirm, csrfToken: csrfData.csrfToken })
        });

        const data = await response.json();

        if (!response.ok) {
          loadingDiv.style.display = 'none';
          errorMsg.textContent =
            data.error || 'Registration failed. Please try again.';
          errorMsg.classList.add('show');
          return;
        }

        successMsg.textContent =
          'Registration successful! Redirecting to login...';
        successMsg.classList.add('show');

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (error) {
        loadingDiv.style.display = 'none';
        errorMsg.textContent =
          'An error occurred. Please try again later.';
        errorMsg.classList.add('show');
        console.error('Registration error:', error);
      }
    });
  </script>
</body>
</html>
